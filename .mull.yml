# mull (mutation testing) config — used by the manual "Mutation testing" CI job.
# Scope is the pure-logic engine where unit tests are deterministic and fast, so
# surviving mutants point at genuine test-coverage gaps rather than flaky I/O.
mutators:
  - cxx_arithmetic
  - cxx_comparison
  - cxx_boundary
  - cxx_logical
  - cxx_remove_void_call

includePaths:
  - playback
  - recorder_engine

excludePaths:
  - tests
  - build
  - _deps
  - .*\.mm$

# Per-mutant test timeout (ms). The logic unit tests are sub-second.
timeout: 5000
