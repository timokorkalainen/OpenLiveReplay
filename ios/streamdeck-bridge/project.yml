name: StreamDeckBridge
options:
  bundleIdPrefix: com.timokorkalainen
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  StreamDeckKit:
    url: https://github.com/elgatosf/streamdeck-kit-ipad
    exactVersion: 1.3.0
targets:
  StreamDeckBridge:
    type: framework
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: StreamDeckKit
        product: StreamDeckKit
      - package: StreamDeckKit
        product: StreamDeckSimulator
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        SKIP_INSTALL: NO
        CODE_SIGNING_ALLOWED: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    scheme:
      testTargets:
        - StreamDeckBridgeTests
  StreamDeckBridgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: StreamDeckBridge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
