name: CI

# CI is comprehensive but wall-clock-bounded (~6 min). GHA is free for this
# public repo, so the budget is WALL-CLOCK, not minutes: jobs fan out in parallel
# across macOS, Linux and Windows, each leaning on caching (Qt, Homebrew/apt,
# ccache, and the from-source Windows FFmpeg/SRT deps) to stay within budget.
#   * lint / workflow-lint  -- fast static checks on Linux
#   * build-test-macos      -- clang -Werror build + fast unit (-L ci) + clang-tidy
#   * build-test-linux      -- GCC -Werror + unit under ASan+UBSan+LeakSanitizer
#   * build-test-windows    -- MinGW build (cached from-source FFmpeg/SRT) + Media Foundation unit tests
#   * sanitizers            -- clang ASan/UBSan (unit + e2e) and TSan, on macOS
#
# The local .githooks/pre-push hook is a fast pre-flight (single-platform build +
# fast unit + lint) so PRs rarely fail on trivia; the exhaustive gating lives
# here. iOS is the only build NOT in CI (its from-source FFmpeg+SRT+OpenSSL
# OOM-kills hosted runners) -- it stays in the pre-push hook.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_VERSION: 6.10.1
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  # ---------------------------------------------------------------------------
  # Classify changed files once so docs-only PRs do not pay for build/lint CI.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.classify.outputs.app }}
      format: ${{ steps.classify.outputs.format }}
      qml: ${{ steps.classify.outputs.qml }}
      native: ${{ steps.classify.outputs.native }}
      workflow: ${{ steps.classify.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "app=true"
              echo "format=true"
              echo "qml=true"
              echo "native=true"
              echo "workflow=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi

          app=false
          format=false
          qml=false
          native=false
          workflow=false
          files="$(git diff --name-only "$base" HEAD || true)"

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            case "$file" in
              .github/workflows/*)
                workflow=true
                ;;
            esac

            case "$file" in
              # The workflow file defines every gate, so a change to it must
              # re-run them ALL -- otherwise the gate's own rulebook could be
              # edited with the gates it controls skipped, and "CI gate" counts a
              # skipped required job as a pass (vacuously green).
              .github/workflows/*)
                app=true
                format=true
                qml=true
                native=true
                ;;
              # Lint/sanitizer/build rulebooks: a change here must re-run the gates
              # that consult them (clang-format / qmllint / the clang-tidy floor /
              # the sanitizer suppressions / the cross-platform builds), for the
              # same self-referential reason.
              .clang-tidy|.clang-format|qmllint.ini|qmllint.ini.in|.pre-commit-config.yaml|.githooks/*|tests/lsan.suppressions.txt|tests/tsan.suppressions.txt)
                app=true
                format=true
                native=true
                ;;
              *.md|docs/*)
                ;;
              *.cpp|*.c|*.h|*.hpp|*.mm)
                app=true
                format=true
                native=true
                ;;
              *.qml)
                app=true
                qml=true
                ;;
              CMakeLists.txt|*/CMakeLists.txt|*.cmake|CMakePresets.json)
                app=true
                native=true
                ;;
              recorder_engine/*|playback/*|project/*|telemetry/*|midi/*|streamdeck/*|ios/*|tests/*|build-scripts/*|*.qrc|*.plist|*.entitlements)
                app=true
                ;;
              *)
                app=true
                ;;
            esac
          done <<< "$files"

          {
            echo "app=$app"
            echo "format=$format"
            echo "qml=$qml"
            echo "native=$native"
            echo "workflow=$workflow"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Lint the workflow files themselves (only when they change). Linux + go-installed
  # actionlint (shellcheck is preinstalled on ubuntu-latest).
  # ---------------------------------------------------------------------------
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.workflow == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: actionlint
        run: |
          "$(go env GOPATH)/bin/actionlint" .github/workflows/ci.yml .github/workflows/build.yml

  # ---------------------------------------------------------------------------
  # Static source lint -- OS-agnostic, so it runs on Linux (1x). clang-format on
  # changed lines + strict qmllint + advisory qmlformat. Each setup step is gated
  # by the file types that need it.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.format == 'true' || needs.changes.outputs.qml == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: clang-format (changed lines)
        if: ${{ needs.changes.outputs.format == 'true' }}
        run: |
          # Pinned LLVM clang-format from apt.llvm.org so the changed-lines gate
          # tracks the Homebrew-LLVM clang-format used by the local hooks (same
          # major version). Only the lines changed in this PR are checked
          # (git-clang-format), so pre-existing formatting is not re-enforced.
          LLVM_VER=20
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          codename="$(. /etc/os-release && echo "$VERSION_CODENAME")"
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-${LLVM_VER} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y "clang-format-${LLVM_VER}"
          CF="$(command -v "clang-format-${LLVM_VER}")"
          "$CF" --version
          # git-clang-format is a standalone python script; fetch the matching one.
          GCF=/tmp/git-clang-format
          curl -fsSL "https://raw.githubusercontent.com/llvm/llvm-project/release/${LLVM_VER}.x/clang/tools/clang-format/git-clang-format" -o "$GCF"
          chmod +x "$GCF"
          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          diff="$("$GCF" --binary "$CF" --commit "$base" --diff --extensions cpp,h,hpp,mm,c || true)"
          case "$diff" in
            "no modified files to format"|"clang-format did not modify any files"|"")
              echo "clang-format: changed lines OK" ;;
            *)
              echo "$diff"
              echo "::error::clang-format violations in changed lines (run: git clang-format $base)"
              exit 1 ;;
          esac

      - name: Install Qt (for qmllint)
        if: ${{ needs.changes.outputs.qml == 'true' }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets   # Main.qml imports QtMultimedia (VideoOutput)
          cache: true

      - name: Install qmllint runtime libs
        if: ${{ needs.changes.outputs.qml == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0

      - name: qmllint
        if: ${{ needs.changes.outputs.qml == 'true' }}
        # Lint every QML file in the module. qmllint exits 0 on plain warnings, so
        # promote the high-signal categories to errors to make them a real gate;
        # known false positives are suppressed inline with `// qmllint disable`.
        run: |
          # The bespoke OlrTheme module is emitted by the CMake build, which this
          # lightweight job does not run (Qt only, not the full native toolchain). It is
          # pure QML, so synthesize a throwaway import dir with a qmldir so qmllint can
          # resolve `import OlrTheme` and Main.qml's Theme.* references without a build.
          # (Required now that --unqualified is an error: an unresolved import would turn
          # every Theme.* reference into a hard failure.)
          LINT_IMPORTS="$(mktemp -d)"
          mkdir -p "$LINT_IMPORTS/OlrTheme"
          ln -s "$PWD/ui/theme/Theme.qml" "$LINT_IMPORTS/OlrTheme/Theme.qml"
          printf 'module OlrTheme\nsingleton Theme 1.0 Theme.qml\n' > "$LINT_IMPORTS/OlrTheme/qmldir"
          "$QT_ROOT_DIR/bin/qmllint" \
            --unqualified error --Quick.layout-positioning error \
            -I "$LINT_IMPORTS" -I "$QT_ROOT_DIR/qml" \
            Main.qml MultiviewWindow.qml CodecSettingsPanel.qml

      # qmlformat is ADVISORY (report-only): the existing QML predates it, so it is
      # introduced without reformatting the tree (same policy as clang-format).
      # Promote to a gate after a one-shot repo-wide qmlformat -i.
      - name: qmlformat (advisory)
        if: ${{ needs.changes.outputs.qml == 'true' }}
        continue-on-error: true
        run: |
          QF="$QT_ROOT_DIR/bin/qmlformat"
          for f in Main.qml MultiviewWindow.qml CodecSettingsPanel.qml; do
            "$QF" "$f" | diff -u "$f" - || echo "::warning file=$f::qmlformat would reformat $f"
          done

  # ---------------------------------------------------------------------------
  # Build the macOS app + test suite and run CTest. Apple-clang -Werror build,
  # the fast unit label, and clang-tidy on changed files. The playback e2e runs
  # (under ASan+UBSan) in the sanitizers/asan-e2e leg, so it is not duplicated
  # here -- that keeps this job comfortably within the wall-clock budget.
  # ---------------------------------------------------------------------------
  build-test-macos:
    name: Build + Test (macOS)
    runs-on: macos-14
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # clang-tidy diff needs history

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia qtwebsockets qtshadertools
          cache: true

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-build-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-build-
            ${{ runner.os }}-homebrew-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-build-test-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-build-test-
            ${{ runner.os }}-ccache-

      - name: Install build deps
        run: brew install ninja ffmpeg srt ccache

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=ON
          -DOLR_GPU_PIPELINE=ON
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build (app + tests)
        run: cmake --build build

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Run short PR tests
        working-directory: build
        # The fast "ci" CTest label. Full transport/report labels stay in the
        # local pre-push hook and are excluded defensively; the playback e2e gate
        # below adds worker-level coverage on top of the unit label.
        run: ctest --output-on-failure --repeat until-pass:2 -L ci -LE 'sync-report|srt|native-apple-ingest|native-rtmp'

      # clang-tidy is a GATE: WarningsAsErrors in .clang-tidy makes any finding in a
      # changed first-party file fatal, using the generated compile_commands.json.
      # The whole first-party tree is tidy-clean, so only regressions in touched
      # files fail — the same "lint owns the floor" model as clang-format.
      - name: clang-tidy (changed files)
        if: ${{ needs.changes.outputs.format == 'true' }}
        run: |
          brew install llvm
          TIDY="$(brew --prefix llvm)/bin/clang-tidy"
          SDK="$(xcrun --show-sdk-path)"
          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="${{ github.event.before }}"
          # All-zeros SHA (new branch) or an unreachable base -> diff vs parent.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          files=$(git diff --name-only "$base" HEAD -- \
                    'recorder_engine/*.cpp' 'playback/*.cpp' 'project/*.cpp' \
                    'telemetry/*.cpp' 'websocket/*.cpp' \
                    'settingsmanager.cpp' 'uimanager.cpp' 'midi/*.cpp' || true)
          if [ -z "$files" ]; then echo "No first-party C++ changes."; exit 0; fi
          printf '%s\n' "$files"
          # Pass 1 — WHOLE changed file, config-driven WarningsAsErrors.
          rc=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            "$TIDY" -p build --extra-arg=-isysroot --extra-arg="$SDK" "$file" || rc=1
          done <<< "$files"
          # Pass 2 — DIFF-SCOPED integer-coercion gate (NEW occurrences fatal).
          CTD="$(brew --prefix llvm)/share/clang/clang-tidy-diff.py"
          git diff -U0 "$base" HEAD -- \
              'recorder_engine/*.cpp' 'playback/*.cpp' 'project/*.cpp' \
              'telemetry/*.cpp' 'websocket/*.cpp' \
              'settingsmanager.cpp' 'uimanager.cpp' 'midi/*.cpp' \
            | python3 "$CTD" -p1 -path build -clang-tidy-binary "$TIDY" \
                -checks='-*,cppcoreguidelines-narrowing-conversions,bugprone-implicit-widening-of-multiplication-result' \
                -warnings-as-errors='*' -extra-arg=-isysroot -extra-arg="$SDK" || rc=1
          exit "$rc"

  # ---------------------------------------------------------------------------
  # Build the Windows app (MinGW) + run the deterministic Media Foundation unit
  # tests. FFmpeg + SRT are built from pinned source (build_ffmpeg_windows_srt.sh
  # is idempotent) and CACHED at windows_build/dist, keyed on that script's hash:
  # a cache hit skips the ~20-min dep build, so warm runs fit the wall-clock
  # budget (the cold first run after a cache miss is the one-time exception).
  # Builds the app target (validates the win32/Media-Foundation code compiles)
  # plus the two self-contained MF unit tests.
  # ---------------------------------------------------------------------------
  build-test-windows:
    name: Build + Test (Windows, MinGW)
    runs-on: windows-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (MinGW) + tools
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: qtmultimedia qtwebsockets qtshadertools
          tools: tools_mingw1310 tools_ninja
          cache: true

      - name: Cache Windows FFmpeg/SRT (from-source deps)
        uses: actions/cache@v4
        with:
          path: windows_build/dist
          key: ${{ runner.os }}-winffmpeg-srt-${{ hashFiles('build-scripts/build_ffmpeg_windows_srt.sh') }}
          restore-keys: |
            ${{ runner.os }}-winffmpeg-srt-

      - name: Build FFmpeg + SRT (idempotent; cached)
        shell: bash
        run: |
          set -euo pipefail
          export OLR_QT_ROOT="${QT_ROOT_DIR//\\//}"
          ./build-scripts/build_ffmpeg_windows_srt.sh

      - name: Build app + MF unit tests
        shell: bash
        run: |
          set -euo pipefail
          export OLR_QT_ROOT="${QT_ROOT_DIR//\\//}"
          # Discover the newest MinGW kit + Ninja the same way the build scripts do.
          # shellcheck disable=SC2012
          newest() { ls -d "$@" 2>/dev/null | sort -V | tail -1 || true; }
          QT_TOOLS_DIR="$(cd "$OLR_QT_ROOT/../.." && pwd)/Tools"
          : "${OLR_MINGW_ROOT:=$(newest "$QT_TOOLS_DIR"/mingw*_64)}"
          [ -n "${OLR_MINGW_ROOT:-}" ] || OLR_MINGW_ROOT="$(newest C:/Qt/Tools/mingw*_64)"
          NINJA_BIN="$(command -v ninja || true)"
          [ -n "$NINJA_BIN" ] || NINJA_BIN="$(newest "$QT_TOOLS_DIR"/Ninja/ninja.exe)"
          NINJA_DIR="$(dirname "$NINJA_BIN")"
          export PATH="$OLR_MINGW_ROOT/bin:$NINJA_DIR:$PATH"
          FFMPEG_ROOT="$(cd windows_build/dist/ffmpeg && pwd)"
          SRT_ROOT="$(cd windows_build/dist/srt && pwd)"
          # OLR_WERROR=OFF: the Windows job validates compile + link + the MF
          # tests, not warning-cleanliness (the macOS clang and Linux GCC -Werror
          # legs own that). MinGW GCC at Release -O3 trips -Werror=null-dereference
          # inside Qt's own qhash.h (the generated qmlcache loader), which is not a
          # first-party defect.
          cmake -S . -B build-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOLR_BUILD_TESTS=ON \
            -DOLR_BUILD_GPU_PROBES=ON \
            -DOLR_GPU_PIPELINE=ON \
            -DOLR_WERROR=OFF \
            -DCMAKE_PREFIX_PATH="$OLR_QT_ROOT" \
            -DCMAKE_C_COMPILER="$OLR_MINGW_ROOT/bin/gcc.exe" \
            -DCMAKE_CXX_COMPILER="$OLR_MINGW_ROOT/bin/g++.exe" \
            -DCMAKE_MAKE_PROGRAM="$NINJA_BIN" \
            -DOLR_FFMPEG_ROOT="$FFMPEG_ROOT" \
            -DOLR_SRT_ROOT="$SRT_ROOT"
          cmake --build build-tests --target OpenLiveReplay tst_nativeaacdecoder tst_nativevideodecoder tst_gpufence tst_gpucompositor rhi_d3d_probe

      - name: Run Windows GPU import probe (diagnostic)
        shell: bash
        continue-on-error: true
        run: |
          set +e
          probe="./build-tests/tests/probes/rhi_d3d_probe"
          [ -x "$probe" ] || probe="${probe}.exe"
          if [ ! -x "$probe" ]; then
            echo "::warning::rhi_d3d_probe executable not found"
            find build-tests/tests/probes -maxdepth 2 -type f -print || true
            exit 0
          fi
          "$probe"
          rc=$?
          echo "rhi_d3d_probe exit code: $rc"
          exit "$rc"

      - name: Run Media Foundation + WARP GPU unit tests
        shell: bash
        # tst_nativevideodecoder is BUILT above (Windows compile coverage) but not
        # RUN here: its Media Foundation video-decode capability probe hangs on the
        # headless hosted runner (no GPU/D3D) and times out. tst_nativeaacdecoder
        # (a canned ADTS fixture through the in-box AAC MFT) is deterministic.
        # tst_gpucompositor exercises the QRhi D3D11 WARP byte-exact compat lane;
        # tst_gpufence exercises the D3D11 fence event wait path through WARP.
        run: |
          set -euo pipefail
          export OLR_REQUIRE_GPU_FENCE=1
          export OLR_REQUIRE_WARP=1
          export QT_QPA_PLATFORM=offscreen
          ctest --test-dir build-tests --output-on-failure \
            -R '^(tst_nativeaacdecoder|tst_gpufence)$'
          gpu_test="./build-tests/tests/unit/tst_gpucompositor"
          [ -x "$gpu_test" ] || gpu_test="${gpu_test}.exe"
          "$gpu_test" -v2

  # ---------------------------------------------------------------------------
  # Second toolchain: build the app + tests with GCC on Linux and run the unit
  # suite under ASan+UBSan+LSan. The only leg that exercises GCC's -Werror
  # (warnings clang misses) and LeakSanitizer (unsupported on macOS). On Linux
  # the native ingest compiles via the cross-platform stubs and NDI is
  # runtime-loaded, so no Apple/Windows SDKs are required.
  # ---------------------------------------------------------------------------
  build-test-linux:
    name: Build + Test (Linux, GCC)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets qtshadertools
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-linux-gcc-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-gcc-
            ${{ runner.os }}-ccache-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      # GCC -Werror is the second-compiler gate; ASan+UBSan+LSan instruments the
      # unit run. detect_leaks works here (Linux), unlike the macOS legs.
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=ON
          -DOLR_SANITIZER="address;undefined"
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      # -k 0 (ninja keep-going) so a first GCC bring-up surfaces every
      # -Werror diff in one run instead of one-per-push; still exits non-zero.
      - name: Build (app + tests)
        run: cmake --build build -- -k 0

      - name: Shader toolchain compile (qsb / qsb bake)
        run: |
          set -euo pipefail
          cmake -S . -B build-gpu -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOLR_BUILD_TESTS=ON \
            -DOLR_GPU_PIPELINE=ON \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build-gpu --target olr_test_gpu
          QSB="$QT_ROOT_DIR/bin/qsb"
          for stage in vert frag; do
            qsbfile="$(find build-gpu -name "passthrough.$stage.qsb" | head -1)"
            test -n "$qsbfile" || { echo "missing passthrough.$stage.qsb"; exit 1; }
            test -s "$qsbfile" || { echo "empty passthrough.$stage.qsb"; exit 1; }
            dump="$("$QSB" --dump "$qsbfile")"
            echo "$dump"
            echo "$dump" | grep -q "SPIR-V" || { echo "no SPIR-V target in $stage"; exit 1; }
            echo "$dump" | grep -q "MSL" || { echo "no MSL target in $stage"; exit 1; }
            echo "$dump" | grep -q "HLSL" || { echo "no HLSL target in $stage"; exit 1; }
            echo "$dump" | grep -q "GLSL" || { echo "no GLSL target in $stage"; exit 1; }
          done
          echo "Shader toolchain OK: pass-through .qsb baked multi-target."

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Run unit suite (ASan+UBSan+LSan)
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.suppressions.txt
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure --repeat until-pass:2 -L unit -LE 'sync-report|srt|native-apple-ingest|native-rtmp'

  # ---------------------------------------------------------------------------
  # Sanitizer gates (macOS clang). asan-ubsan runs the WHOLE unit label under
  # ASan+UBSan; tsan runs the threading-sensitive cases under TSan; asan-e2e runs
  # the deterministic playback e2e + native SRT smoke under ASan+UBSan. These are
  # the only sanitizer coverage of the VideoToolbox/AudioToolbox native-codec
  # code (it builds as stubs on the Linux leg). LeakSanitizer is NOT here (macOS
  # unsupported) — it runs on the Linux leg.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers
    runs-on: macos-14
    needs: changes
    if: ${{ needs.changes.outputs.native == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Empty build_targets => build the whole suite and run the full unit
          # label; a non-empty list builds only those threading/harness targets.
          - sanitizer: "address;undefined"
            label: asan-ubsan
            advisory: false
            build_targets: ""
          - sanitizer: "thread"
            label: tsan
            advisory: false
            build_targets: "tst_trackbuffer tst_audioframequeue tst_outputdispatcher tst_outputruntime tst_commitgate tst_seekcoalescer tst_outputbusengine tst_ndiingest"
          - sanitizer: "thread"
            label: tsan-gpu
            advisory: false
            build_targets: "tst_gpufence tst_gpugeneration tst_evictionguard tst_stagingfence tst_gpu_sync_stress tst_gpuframedata tst_gpucompositor_stress"
          # asan-e2e: only the e2e harness binaries need building — the playback
          # matrix drives play_harness + record_harness; the native SRT smoke
          # drives record_harness. Both link olr_sanitize, so this build is
          # genuinely -fsanitize=address,undefined instrumented.
          - sanitizer: "address;undefined"
            label: asan-e2e
            advisory: false
            build_targets: "play_harness record_harness"
    continue-on-error: ${{ matrix.advisory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia qtwebsockets qtshadertools
          cache: true

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-sanitizers-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-sanitizers-
            ${{ runner.os }}-homebrew-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-sanitizers-${{ matrix.label }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-sanitizers-${{ matrix.label }}-
            ${{ runner.os }}-ccache-sanitizers-
            ${{ runner.os }}-ccache-

      - name: Install build deps
        run: brew install ninja ffmpeg srt ccache

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure (${{ matrix.label }})
        run: |
          gpu_args=()
          if [ "${{ matrix.label }}" = "tsan-gpu" ]; then
            gpu_args+=(-DOLR_GPU_PIPELINE=ON)
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOLR_BUILD_TESTS=ON \
            -DOLR_WERROR=ON \
            -DOLR_SANITIZER="${{ matrix.sanitizer }}" \
            "${gpu_args[@]}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build tests
        run: |
          if [ -n "${{ matrix.build_targets }}" ]; then
            cmake --build build --target ${{ matrix.build_targets }}
          else
            cmake --build build
          fi

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      # asan-e2e GATING part: the deterministic playback e2e subset (the real
      # threaded PlaybackWorker, record + play, over the native srt:// loopback).
      # until-pass:3 absorbs a transient loopback timing flake; it does NOT mask
      # an ASan/UBSan finding (abort_on_error/halt_on_error make those a hard,
      # deterministic abort that re-fires every relaunch).
      - name: Run playback e2e under ASan+UBSan (gating)
        if: ${{ matrix.label == 'asan-e2e' }}
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --output-on-failure --repeat until-pass:3 --no-tests=error \
            -R '^(e2e_record_stereo|e2e_record_mono|e2e_record_rational_fps|e2e_record_rational_fps_h264|e2e_play_storm|e2e_play_seekplay|e2e_play_armedcut|e2e_play_playlist)$'

      # asan-e2e ADVISORY part: the native SRT ingest smoke under the SAME
      # instrumentation. continue-on-error because its srt-live-transmit
      # connect/handshake timing can flake on shared runners; a real ASan/UBSan
      # abort still exits non-zero in the log. until-pass:3 retries only the
      # connect-timing flake.
      - name: Run native SRT ingest smoke under ASan+UBSan (advisory)
        if: ${{ matrix.label == 'asan-e2e' }}
        continue-on-error: true
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --output-on-failure --repeat until-pass:3 --no-tests=error \
            -R '^e2e_native_srt_smoke$'

      - name: Run sanitizer checks
        if: ${{ matrix.label != 'asan-e2e' }}
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          TSAN_OPTIONS: halt_on_error=1:suppressions=${{ github.workspace }}/tests/tsan.suppressions.txt
        run: |
          if [ "${{ matrix.label }}" = "tsan" ]; then
            ctest --output-on-failure --repeat until-pass:2 \
              -R '^(tst_trackbuffer|tst_audioframequeue|tst_outputdispatcher|tst_outputruntime|tst_commitgate|tst_seekcoalescer|tst_outputbusengine|tst_ndiingest)$'
          elif [ "${{ matrix.label }}" = "tsan-gpu" ]; then
            ctest --output-on-failure --repeat until-pass:2 \
              -R '^(tst_gpufence|tst_gpugeneration|tst_evictionguard|tst_stagingfence|tst_gpu_sync_stress|tst_gpuframedata|tst_gpucompositor_stress)$'
          else
            ctest --output-on-failure --repeat until-pass:2 \
              -L unit -LE 'sync-report|srt|native-apple-ingest|native-rtmp'
          fi

  # ---------------------------------------------------------------------------
  # Coverage -- REPORT-ONLY, now MANUAL (workflow_dispatch only). It gates
  # nothing (continue-on-error, no threshold) and re-ran the unit suite a 4th
  # time on every PR, so it is off the per-PR path. Trigger on demand to refresh
  # the gcovr report; promote to a gate by adding `--fail-under-line <N>`.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage (report-only, manual)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build gcovr pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev

      - name: Configure (gcov)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=OFF
          -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
          -DCMAKE_C_FLAGS="--coverage -O0 -g"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build (app + tests)
        run: cmake --build build

      - name: Run unit suite
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure -L unit -LE 'sync-report|srt|native-apple-ingest|native-rtmp' || true

      - name: gcovr report
        run: |
          gcovr --root . \
            --filter 'recorder_engine/' --filter 'playback/' --filter 'project/' \
            --filter 'telemetry/' --filter 'websocket/' \
            --print-summary --html-details coverage.html --xml coverage.xml || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.html
            coverage.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Mutation testing (mull) -- MANUAL/experimental (workflow_dispatch only). A
  # strong test-quality signal: it mutates the pure-logic engine and checks the
  # unit tests catch the mutants. Not a PR gate (slow, and tuning the survivor
  # baseline is ongoing); never blocks. See .mull.yml for the filtered scope.
  # ---------------------------------------------------------------------------
  mutation-testing:
    name: Mutation testing (mull, manual)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + mull
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-19 llvm-19 ninja-build pkg-config curl \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev
          curl -sSL https://github.com/mull-project/mull/releases/download/0.24.0/Mull-0.24.0-LLVM-19.0-ubuntu-24.04.deb -o mull.deb
          sudo dpkg -i mull.deb || sudo apt-get -f install -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Build a logic unit test with the mull pass plugin
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DOLR_BUILD_TESTS=ON -DOLR_WERROR=OFF \
            -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang-19 \
            -DCMAKE_CXX_FLAGS="-fpass-plugin=$(echo /usr/lib/mull*/libmull-ir-frontend*.so) -g -grecord-command-line -O0" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --target tst_cutschedule tst_frameindex tst_playlistplayout

      - name: Run mull on the logic unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          for t in tst_cutschedule tst_frameindex tst_playlistplayout; do
            mull-runner-19 --report-name "$t-mutants" "build/tests/unit/$t" || true
          done

  # ---------------------------------------------------------------------------
  # Fuzz the untrusted-input parsers (SRT/UDP/RTMP ingest). MANUAL/experimental
  # (workflow_dispatch only) — continuous fuzzing finds bugs over time; never a
  # PR gate. clang ships libFuzzer; a crash exits non-zero and uploads the
  # reproducer.
  # ---------------------------------------------------------------------------
  fuzz:
    name: Fuzz (parsers, manual)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev

      - name: Configure (clang + libFuzzer)
        run: >
          cmake -S . -B build-fuzz -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_FUZZERS=ON
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build fuzzers
        run: cmake --build build-fuzz --target fuzz_mpegtsparser fuzz_h26xaccessunit fuzz_h26xseitimecode fuzz_rtmpprotocol

      - name: Run fuzzers
        working-directory: build-fuzz/tests/fuzz
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          rc=0
          seeds="$GITHUB_WORKSPACE/tests/fuzz/seeds"
          for f in fuzz_mpegtsparser fuzz_h26xaccessunit fuzz_h26xseitimecode fuzz_rtmpprotocol; do
            echo "::group::$f"
            # Start from the committed seeds (the structurally-valid PAT/PMT/PES,
            # AnnexB, SEI and RTMP chunk inputs) so the run reaches the deep
            # parser state machines on a cold runner; grow a throwaway corpus.
            mkdir -p "corpus-$f"
            "./$f" -max_total_time=90 -print_final_stats=1 -artifact_prefix="$f-" \
              "corpus-$f" "$seeds/$f" || rc=1
            echo "::endgroup::"
          done
          exit "$rc"

      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: build-fuzz/tests/fuzz/fuzz_*-crash-*
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Single aggregate status for branch protection. Requiring this one check is
  # robust against matrix-name churn and conditional skips: it passes when every
  # required job either succeeded or was skipped (e.g. a docs-only PR), and fails
  # if any required job failed or was cancelled. Coverage/mull/fuzz (manual) and
  # workflow-lint are intentionally not gated here.
  #
  # NOTE: the branch-protection required check is "CI gate" (this job's name).
  # Keep that name stable.
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [lint, build-test-macos, build-test-windows, build-test-linux, sanitizers]
    if: ${{ always() }}
    steps:
      - name: Require all gating jobs to pass (skipped is allowed)
        run: |
          for r in \
            "lint=${{ needs.lint.result }}" \
            "build-test-macos=${{ needs.build-test-macos.result }}" \
            "build-test-windows=${{ needs.build-test-windows.result }}" \
            "build-test-linux=${{ needs.build-test-linux.result }}" \
            "sanitizers=${{ needs.sanitizers.result }}"; do
            name="${r%%=*}"; res="${r#*=}"
            echo "$name: $res"
            if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
              echo "::error::Required job '$name' did not pass (result: $res)"
              fail=1
            fi
          done
          exit "${fail:-0}"

# iOS is the only build intentionally NOT in CI: its from-source
# FFmpeg+SRT+OpenSSL build (~20 min) OOM-kills hosted runners. It is validated
# locally via the .githooks/pre-push hook (OLR_PREPUSH_FULL). See tests/README.md.
