name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_VERSION: 6.10.1
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  # ---------------------------------------------------------------------------
  # Classify changed files once so workflow/docs-only PRs do not pay for app CI.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.classify.outputs.app }}
      format: ${{ steps.classify.outputs.format }}
      qml: ${{ steps.classify.outputs.qml }}
      native: ${{ steps.classify.outputs.native }}
      workflow: ${{ steps.classify.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "app=true"
              echo "format=true"
              echo "qml=true"
              echo "native=true"
              echo "workflow=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi

          app=false
          format=false
          qml=false
          native=false
          workflow=false
          files="$(git diff --name-only "$base" HEAD || true)"

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            case "$file" in
              .github/workflows/*)
                workflow=true
                ;;
            esac

            case "$file" in
              .github/workflows/*|*.md|docs/*)
                ;;
              *.cpp|*.c|*.h|*.hpp|*.mm)
                app=true
                format=true
                native=true
                ;;
              *.qml)
                app=true
                qml=true
                ;;
              CMakeLists.txt|*/CMakeLists.txt|*.cmake|CMakePresets.json)
                app=true
                native=true
                ;;
              recorder_engine/*|playback/*|project/*|telemetry/*|midi/*|streamdeck/*|ios/*|tests/*|build-scripts/*|*.qrc|*.plist|*.entitlements)
                app=true
                ;;
              *)
                app=true
                ;;
            esac
          done <<< "$files"

          {
            echo "app=$app"
            echo "format=$format"
            echo "qml=$qml"
            echo "native=$native"
            echo "workflow=$workflow"
          } >> "$GITHUB_OUTPUT"

  workflow-lint:
    name: Workflow lint
    runs-on: macos-14
    needs: changes
    if: ${{ needs.changes.outputs.workflow == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-workflow-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-workflow-
            ${{ runner.os }}-homebrew-

      - name: Install actionlint
        run: brew install actionlint shellcheck

      - name: actionlint
        run: actionlint .github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # Build the macOS app + test suite and run CTest. This is the primary gate.
  # ---------------------------------------------------------------------------
  build-test-macos:
    name: Build + Test (macOS)
    runs-on: macos-14
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # clang-tidy diff needs history

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-build-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-build-
            ${{ runner.os }}-homebrew-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-build-test-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-build-test-
            ${{ runner.os }}-ccache-

      - name: Install build deps
        run: brew install ninja ffmpeg srt ccache

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=ON
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build (app + tests)
        run: cmake --build build

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Run short PR tests
        working-directory: build
        # PR CI runs the fast "ci" CTest label. Full transport/report labels stay
        # in the local pre-push hook and are excluded defensively; the playback
        # e2e gate below adds worker-level coverage on top of the unit label.
        run: ctest --output-on-failure --repeat until-pass:2 -L ci -LE 'sync-report|srt|native-apple-ingest|native-rtmp'

      # Representative end-to-end gate: the headless record + PlaybackWorker matrix
      # (the project's highest-risk threaded code) over the native srt:// loopback,
      # which the macOS runner supports (brew srt ships srt-live-transmit; python3
      # is preinstalled). A curated subset keeps wall-clock bounded; until-pass:3
      # absorbs transient loopback timing flakes so the gate stays trustworthy.
      - name: Run playback e2e gate
        working-directory: build
        run: |
          ctest --output-on-failure --repeat until-pass:3 --no-tests=error \
            -R '^(e2e_record_stereo|e2e_record_mono|e2e_play_storm|e2e_play_seekplay|e2e_play_armedcut|e2e_play_playlist)$'

      # clang-tidy is a GATE: WarningsAsErrors in .clang-tidy makes any finding in a
      # changed first-party file fatal, using the generated compile_commands.json.
      # The whole first-party tree is tidy-clean, so only regressions in touched
      # files fail — the same "lint owns the floor" model as clang-format.
      - name: clang-tidy (changed files)
        if: ${{ needs.changes.outputs.format == 'true' }}
        run: |
          brew install llvm
          TIDY="$(brew --prefix llvm)/bin/clang-tidy"
          SDK="$(xcrun --show-sdk-path)"
          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="${{ github.event.before }}"
          # All-zeros SHA (new branch) or an unreachable base -> diff vs parent.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          files=$(git diff --name-only "$base" HEAD -- \
                    'recorder_engine/*.cpp' 'playback/*.cpp' 'project/*.cpp' \
                    'telemetry/*.cpp' 'websocket/*.cpp' \
                    'settingsmanager.cpp' 'uimanager.cpp' 'midi/*.cpp' || true)
          if [ -z "$files" ]; then echo "No first-party C++ changes."; exit 0; fi
          printf '%s\n' "$files"
          # Pass 1 — WHOLE changed file, config-driven WarningsAsErrors: the
          # high-signal bug classes (analyzer, bugprone, member-init, ...) are
          # tree-clean, so any finding anywhere in a touched file is fatal.
          rc=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            "$TIDY" -p build --extra-arg=-isysroot --extra-arg="$SDK" "$file" || rc=1
          done <<< "$files"
          # Pass 2 — DIFF-SCOPED integer-coercion gate. narrowing/implicit-widening
          # carry a large grandfathered backlog, so they stay advisory tree-wide
          # (Pass 1 does not fail on them); but any NEW occurrence on the lines this
          # PR changes is fatal here. "Lint owns the floor going forward", matching
          # the clang-format changed-lines model.
          CTD="$(brew --prefix llvm)/share/clang/clang-tidy-diff.py"
          git diff -U0 "$base" HEAD -- \
              'recorder_engine/*.cpp' 'playback/*.cpp' 'project/*.cpp' \
              'telemetry/*.cpp' 'websocket/*.cpp' \
              'settingsmanager.cpp' 'uimanager.cpp' 'midi/*.cpp' \
            | python3 "$CTD" -p1 -path build -clang-tidy-binary "$TIDY" \
                -checks='-*,cppcoreguidelines-narrowing-conversions,bugprone-implicit-widening-of-multiplication-result' \
                -warnings-as-errors='*' -extra-arg=-isysroot -extra-arg="$SDK" || rc=1
          exit "$rc"

  # ---------------------------------------------------------------------------
  # Lightweight static checks. Each setup step is gated by the file types that
  # need it, so C++ formatting and QML linting do not force each other's deps.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: macos-14
    needs: changes
    if: ${{ needs.changes.outputs.format == 'true' || needs.changes.outputs.qml == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Homebrew downloads
        if: ${{ needs.changes.outputs.format == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-lint-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-lint-
            ${{ runner.os }}-homebrew-

      - name: clang-format (changed lines)
        if: ${{ needs.changes.outputs.format == 'true' }}
        run: |
          # Homebrew LLVM clang-format (Xcode does not reliably ship clang-format);
          # committed sources are formatted with the same tool. Only the lines
          # changed in this PR are checked (git-clang-format), so pre-existing
          # formatting in a touched file is not retroactively enforced.
          brew install llvm
          PREFIX="$(brew --prefix llvm)"
          CF="$PREFIX/bin/clang-format"
          GCF="$PREFIX/bin/git-clang-format"
          "$CF" --version
          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          diff="$("$GCF" --binary "$CF" --commit "$base" --diff --extensions cpp,h,hpp,mm,c || true)"
          case "$diff" in
            "no modified files to format"|"clang-format did not modify any files"|"")
              echo "clang-format: changed lines OK" ;;
            *)
              echo "$diff"
              echo "::error::clang-format violations in changed lines (run: git clang-format $base)"
              exit 1 ;;
          esac

      - name: Install Qt (for qmllint)
        if: ${{ needs.changes.outputs.qml == 'true' }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia qtwebsockets   # Main.qml imports QtMultimedia (VideoOutput)
          cache: true

      - name: qmllint
        if: ${{ needs.changes.outputs.qml == 'true' }}
        # Lint every QML file in the module. qmllint exits 0 on plain warnings, so
        # promote the high-signal categories to errors to make them a real gate;
        # known false positives are suppressed inline with `// qmllint disable`.
        run: |
          # The bespoke OlrTheme module is emitted by the CMake build, which this
          # lightweight job does not run (Qt only, not the full native toolchain). It is
          # pure QML, so synthesize a throwaway import dir with a qmldir so qmllint can
          # resolve `import OlrTheme` and Main.qml's Theme.* references without a build.
          # (Required now that --unqualified is an error: an unresolved import would turn
          # every Theme.* reference into a hard failure.)
          LINT_IMPORTS="$(mktemp -d)"
          mkdir -p "$LINT_IMPORTS/OlrTheme"
          ln -s "$PWD/ui/theme/Theme.qml" "$LINT_IMPORTS/OlrTheme/Theme.qml"
          printf 'module OlrTheme\nsingleton Theme 1.0 Theme.qml\n' > "$LINT_IMPORTS/OlrTheme/qmldir"
          "$QT_ROOT_DIR/bin/qmllint" \
            --unqualified error --Quick.layout-positioning error \
            -I "$LINT_IMPORTS" -I "$QT_ROOT_DIR/qml" \
            Main.qml MultiviewWindow.qml CodecSettingsPanel.qml

      # qmlformat is ADVISORY (report-only): the existing QML predates it, so it is
      # introduced without reformatting the tree (same policy as clang-format).
      # Promote to a gate after a one-shot repo-wide qmlformat -i.
      - name: qmlformat (advisory)
        if: ${{ needs.changes.outputs.qml == 'true' }}
        continue-on-error: true
        run: |
          QF="$QT_ROOT_DIR/bin/qmlformat"
          for f in Main.qml MultiviewWindow.qml CodecSettingsPanel.qml; do
            "$QF" "$f" | diff -u "$f" - || echo "::warning file=$f::qmlformat would reformat $f"
          done

  # ---------------------------------------------------------------------------
  # Sanitizer gates. All gating legs have continue-on-error: false.
  #   * asan-ubsan runs the WHOLE unit label under instrumentation.
  #   * tsan runs the threading-sensitive playback/output cases.
  #   * asan-e2e runs the deterministic playback e2e (the real threaded
  #     PlaybackWorker end-to-end) AND the native SRT ingest smoke under
  #     ASan+UBSan — the two highest-risk surfaces (untrusted bytes meeting the
  #     worker's atomics across threads) that the unit/e2e gates otherwise leave
  #     UNinstrumented (the unit run excludes the native-ingest labels; the
  #     build-test-macos e2e gate runs with no sanitizer). The playback-e2e part
  #     is GATING; the native-SRT-smoke part is step-level advisory (it depends on
  #     loopback srt-live-transmit timing that can flake on shared runners — see
  #     its step comment).
  # LeakSanitizer is intentionally NOT enabled here: it is unsupported on macOS
  # (Apple platforms) — leak detection runs on the Linux/GCC leg instead.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers
    runs-on: macos-14
    needs: changes
    if: ${{ needs.changes.outputs.native == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Empty build_targets => build the whole suite and run the full unit
          # label; a non-empty list builds only those threading/harness targets.
          # The ctest selector itself is chosen by label in the run step.
          - sanitizer: "address;undefined"
            label: asan-ubsan
            advisory: false
            build_targets: ""
          - sanitizer: "thread"
            label: tsan
            advisory: false
            build_targets: "tst_trackbuffer tst_audioframequeue tst_outputdispatcher tst_outputruntime tst_commitgate tst_seekcoalescer tst_outputbusengine"
          # asan-e2e: only the e2e harness binaries need building — the playback
          # matrix drives play_harness + record_harness; the native SRT smoke
          # drives record_harness. Both are linked with olr_sanitize, so this
          # build is genuinely -fsanitize=address,undefined instrumented.
          - sanitizer: "address;undefined"
            label: asan-e2e
            advisory: false
            build_targets: "play_harness record_harness"
    continue-on-error: ${{ matrix.advisory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-sanitizers-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-sanitizers-
            ${{ runner.os }}-homebrew-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-sanitizers-${{ matrix.label }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-sanitizers-${{ matrix.label }}-
            ${{ runner.os }}-ccache-sanitizers-
            ${{ runner.os }}-ccache-

      - name: Install build deps
        run: brew install ninja ffmpeg srt ccache

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure (${{ matrix.label }})
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=ON
          -DOLR_SANITIZER="${{ matrix.sanitizer }}"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build tests
        # Empty build_targets builds the whole suite (asan-ubsan); a non-empty
        # list builds only the named threading targets (tsan).
        run: |
          if [ -n "${{ matrix.build_targets }}" ]; then
            cmake --build build --target ${{ matrix.build_targets }}
          else
            cmake --build build
          fi

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      # asan-e2e: the GATING part — the deterministic playback e2e subset (the
      # real threaded PlaybackWorker, record + play, over the native srt://
      # loopback). These are timing/loopback-sensitive, so until-pass:3 absorbs a
      # transient loopback flake. IMPORTANT: until-pass does NOT mask a real
      # ASan/UBSan finding — abort_on_error/halt_on_error make those a hard,
      # deterministic abort that re-fires on every relaunch, so until-pass cannot
      # paper over it (it only retries non-deterministic timing flakes).
      # --no-tests=error fails closed if the regex matches nothing (a relabel
      # that silently dropped the cases would be caught here).
      - name: Run playback e2e under ASan+UBSan (gating)
        if: ${{ matrix.label == 'asan-e2e' }}
        working-directory: build
        env:
          # detect_leaks=0: LeakSanitizer is unsupported on macOS (see Linux leg).
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --output-on-failure --repeat until-pass:3 --no-tests=error \
            -R '^(e2e_record_stereo|e2e_record_mono|e2e_play_storm|e2e_play_seekplay|e2e_play_armedcut|e2e_play_playlist)$'

      # asan-e2e: the ADVISORY part — the native SRT ingest smoke under the SAME
      # ASan+UBSan instrumentation, so the live-ingest path (untrusted SRT bytes
      # in the native NativeSrtIngestSession) runs sanitized. continue-on-error
      # because it stands up srt-live-transmit over UDP->SRT loopback whose
      # connect/handshake timing can flake on shared CI runners; we do NOT want a
      # loopback connect flake to red the whole sanitizers job. A real ASan/UBSan
      # abort here still surfaces in the log (and exits non-zero) for follow-up —
      # advisory means non-blocking, not invisible. until-pass:3 retries only the
      # connect-timing flake; an ASan abort is deterministic and re-fires.
      - name: Run native SRT ingest smoke under ASan+UBSan (advisory)
        if: ${{ matrix.label == 'asan-e2e' }}
        continue-on-error: true
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QT_QPA_PLATFORM: offscreen
        run: |
          ctest --output-on-failure --repeat until-pass:3 --no-tests=error \
            -R '^e2e_native_srt_smoke$'

      - name: Run sanitizer checks
        if: ${{ matrix.label != 'asan-e2e' }}
        working-directory: build
        env:
          # detect_leaks=0: LeakSanitizer is unsupported on macOS (see Linux leg).
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          TSAN_OPTIONS: halt_on_error=1
        # Branch by label so the regex/exclude selectors stay correctly quoted
        # (shell metacharacters like ( | $ must not be word-split by the runner).
        run: |
          if [ "${{ matrix.label }}" = "tsan" ]; then
            ctest --output-on-failure --repeat until-pass:2 \
              -R '^(tst_trackbuffer|tst_audioframequeue|tst_outputdispatcher|tst_outputruntime|tst_commitgate|tst_seekcoalescer|tst_outputbusengine)$'
          else
            ctest --output-on-failure --repeat until-pass:2 \
              -L unit -LE 'sync-report|srt|native-apple-ingest|native-rtmp'
          fi

  # ---------------------------------------------------------------------------
  # Second toolchain: build the app + tests with GCC on Linux and run the unit
  # suite under ASan+UBSan+LSan. This is the only leg that exercises GCC's
  # -Werror (catches warnings clang misses) and LeakSanitizer (unsupported on
  # macOS). On Linux the native ingest compiles via the cross-platform stubs and
  # NDI is runtime-loaded, so no Apple/Windows SDKs are required.
  # ---------------------------------------------------------------------------
  build-test-linux:
    name: Build + Test (Linux, GCC)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build ccache pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-linux-gcc-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-gcc-
            ${{ runner.os }}-ccache-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      # GCC -Werror is the second-compiler gate; ASan+UBSan+LSan instruments the
      # unit run. detect_leaks works here (Linux), unlike the macOS legs.
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=ON
          -DOLR_SANITIZER="address;undefined"
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      # -k 0 (ninja keep-going) so a first GCC bring-up surfaces every
      # -Werror diff in one run instead of one-per-push; still exits non-zero.
      - name: Build (app + tests)
        run: cmake --build build -- -k 0

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Run unit suite (ASan+UBSan+LSan)
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.suppressions.txt
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure --repeat until-pass:2 -L unit -LE 'sync-report|srt|native-apple-ingest|native-rtmp'

  # ---------------------------------------------------------------------------
  # Coverage — REPORT-ONLY (continue-on-error), no failing threshold yet. Builds
  # the unit suite with gcov instrumentation and publishes a gcovr report so the
  # first-party line/branch coverage is visible. Promote to a gate by adding
  # `--fail-under-line <N>` once a non-regressing baseline is agreed.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage (report-only)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build gcovr pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev

      - name: Configure (gcov)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DOLR_BUILD_TESTS=ON
          -DOLR_WERROR=OFF
          -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
          -DCMAKE_C_FLAGS="--coverage -O0 -g"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build (app + tests)
        run: cmake --build build

      - name: Run unit suite
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure -L unit -LE 'sync-report|srt|native-apple-ingest|native-rtmp' || true

      - name: gcovr report
        run: |
          gcovr --root . \
            --filter 'recorder_engine/' --filter 'playback/' --filter 'project/' \
            --filter 'telemetry/' --filter 'websocket/' \
            --print-summary --html-details coverage.html --xml coverage.xml || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.html
            coverage.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Mutation testing (mull) — MANUAL/experimental (workflow_dispatch only). A
  # strong test-quality signal: it mutates the pure-logic engine and checks the
  # unit tests catch the mutants. Not a PR gate (slow, and tuning the survivor
  # baseline is ongoing); never blocks. See .mull.yml for the filtered scope.
  # ---------------------------------------------------------------------------
  mutation-testing:
    name: Mutation testing (mull, manual)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + mull
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-19 llvm-19 ninja-build pkg-config curl \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libsrt-openssl-dev libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev
          curl -sSL https://github.com/mull-project/mull/releases/download/0.24.0/Mull-0.24.0-LLVM-19.0-ubuntu-24.04.deb -o mull.deb
          sudo dpkg -i mull.deb || sudo apt-get -f install -y

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtmultimedia qtwebsockets
          cache: true

      - name: Build a logic unit test with the mull pass plugin
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DOLR_BUILD_TESTS=ON -DOLR_WERROR=OFF \
            -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang-19 \
            -DCMAKE_CXX_FLAGS="-fpass-plugin=$(echo /usr/lib/mull*/libmull-ir-frontend*.so) -g -grecord-command-line -O0" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --target tst_cutschedule tst_frameindex tst_playlistplayout

      - name: Run mull on the logic unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          for t in tst_cutschedule tst_frameindex tst_playlistplayout; do
            mull-runner-19 --report-name "$t-mutants" "build/tests/unit/$t" || true
          done

  # ---------------------------------------------------------------------------
  # Single aggregate status for branch protection. Requiring this one check is
  # robust against matrix-name churn and conditional skips: it passes when every
  # required job either succeeded or was skipped (e.g. a docs-only PR), and fails
  # if any required job failed or was cancelled. Coverage (report-only),
  # workflow-lint, and the manual mull job are intentionally not gated here.
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [lint, build-test-macos, build-test-linux, sanitizers]
    if: ${{ always() }}
    steps:
      - name: Require all gating jobs to pass (skipped is allowed)
        run: |
          for r in \
            "lint=${{ needs.lint.result }}" \
            "build-test-macos=${{ needs.build-test-macos.result }}" \
            "build-test-linux=${{ needs.build-test-linux.result }}" \
            "sanitizers=${{ needs.sanitizers.result }}"; do
            name="${r%%=*}"; res="${r#*=}"
            echo "$name: $res"
            if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
              echo "::error::Required job '$name' did not pass (result: $res)"
              fail=1
            fi
          done
          exit "${fail:-0}"

# iOS is intentionally NOT built in CI: the FFmpeg+SRT+OpenSSL from-source build
# (~20 min) OOM-kills hosted runners. It is validated locally instead via the
# .githooks/pre-push hook. See tests/README.md.
