name: Build apps (manual)

# Manually-triggered packaging build. Produces downloadable, self-contained app
# bundles for Windows and macOS. (Linux is planned for a later PR.)
on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: "Qt version to build against"
        required: false
        default: "6.10.2"

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Qt MinGW kit + the matching MinGW 13.1 toolchain + Ninja. install-qt-action
      # exports QT_ROOT_DIR; the build scripts discover MinGW/Ninja under it.
      - name: Install Qt (MinGW) + tools
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version || '6.10.2' }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: qtmultimedia
          tools: tools_mingw1310 tools_ninja
          cache: true

      # One command: builds FFmpeg + SRT from pinned source, configures, builds,
      # deploys, and zips windows_build/dist/OpenLiveReplay-windows.zip.
      - name: Build (deps + app + deploy)
        shell: bash
        run: |
          export OLR_QT_ROOT="${QT_ROOT_DIR//\\//}"
          ./build-scripts/build_windows_app.sh

      # Run the deterministic Media Foundation unit tests on the real Windows
      # runner. The build step above already built FFmpeg + SRT (into
      # windows_build/dist/{ffmpeg,srt}) and exposed the Qt MinGW kit via
      # QT_ROOT_DIR, so a second OLR_BUILD_TESTS=ON configure into build-tests/
      # reuses that exact toolchain. We build and run only the MF unit tests that
      # are self-contained on a bare runner:
      #   * tst_nativeaacdecoder — feeds a canned base64 AAC-LC ADTS fixture
      #     through the in-box MS AAC Decoder MFT (ships on every Windows SKU);
      #     no network, no external transmitter, fully deterministic.
      #   * tst_nativevideodecoder — probes Media Foundation video-decode
      #     capabilities (no decode, no network, no HEVC OS extension required).
      # Live native-ingest e2e (SRT/RTMP transmitters), HEVC OS extensions and
      # the manual AAC/RTMP audio smoke-test are intentionally NOT in this gate;
      # see docs/windows-aac-rtmp-smoke-runbook.md.
      - name: Run Media Foundation unit tests (ctest)
        shell: bash
        run: |
          set -euo pipefail
          export OLR_QT_ROOT="${QT_ROOT_DIR//\\//}"
          # Mirror the windows-mingw-release preset's toolchain discovery the same
          # way build_windows_app.sh does (newest MinGW kit under <Qt>/../../Tools).
          # shellcheck disable=SC2012  # ls -d on version dirs is intentional (matches build script)
          newest() { ls -d "$@" 2>/dev/null | sort -V | tail -1 || true; }
          QT_TOOLS_DIR=""
          QT_TOOLS_DIR="$(cd "$OLR_QT_ROOT/../.." && pwd)/Tools"
          : "${OLR_MINGW_ROOT:=$(newest "$QT_TOOLS_DIR"/mingw*_64)}"
          [ -n "${OLR_MINGW_ROOT:-}" ] || OLR_MINGW_ROOT="$(newest C:/Qt/Tools/mingw*_64)"
          NINJA_BIN="$(command -v ninja || true)"
          [ -n "$NINJA_BIN" ] || NINJA_BIN="$(newest "$QT_TOOLS_DIR"/Ninja/ninja.exe)"
          NINJA_DIR=""
          NINJA_DIR="$(dirname "$NINJA_BIN")"
          export PATH="$OLR_MINGW_ROOT/bin:$NINJA_DIR:$PATH"
          # FFmpeg + SRT were built by the previous step. The Windows test CMake
          # FATAL_ERRORs without these even though only avutil is actually linked.
          FFMPEG_ROOT=""
          FFMPEG_ROOT="$(cd windows_build/dist/ffmpeg && pwd)"
          SRT_ROOT=""
          SRT_ROOT="$(cd windows_build/dist/srt && pwd)"
          cmake -S . -B build-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOLR_BUILD_TESTS=ON \
            -DCMAKE_PREFIX_PATH="$OLR_QT_ROOT" \
            -DCMAKE_C_COMPILER="$OLR_MINGW_ROOT/bin/gcc.exe" \
            -DCMAKE_CXX_COMPILER="$OLR_MINGW_ROOT/bin/g++.exe" \
            -DCMAKE_MAKE_PROGRAM="$NINJA_BIN" \
            -DOLR_FFMPEG_ROOT="$FFMPEG_ROOT" \
            -DOLR_SRT_ROOT="$SRT_ROOT"
          cmake --build build-tests --target tst_nativeaacdecoder tst_nativevideodecoder
          ctest --test-dir build-tests --output-on-failure \
            -R '^(tst_nativeaacdecoder|tst_nativevideodecoder)$'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenLiveReplay-windows
          path: windows_build/dist/OpenLiveReplay-windows.zip
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version || '6.10.2' }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtmultimedia
          cache: true

      - name: Install build tools
        # ffmpeg + srt are built from source (LGPL, with libsrt) by the script
        # below; only the build tools come from Homebrew.
        run: brew install ninja pkg-config

      - name: Build (from-source ffmpeg+srt) + package (.app)
        shell: bash
        run: ./build-scripts/build_macos_app.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenLiveReplay-macos
          path: macos_build/dist/OpenLiveReplay-macos.zip
          if-no-files-found: error
